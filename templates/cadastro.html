<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle - Cadastro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/cadastro.css">
</head>
<body>
    <nav class = "menu">
            <img src="/assets/logo.png" alt="Nouvelle" width="200" height="100">

            <ul class="menu-links">
            <li><a href="#">Início</a></li>
            <li><a href="#">Filmes em Cartaz</a></li>      
            <li><a href="#">Em Breve</a></li> 

            </ul>
            <ul class="menu-login">

            <li><a href="#" class="btn-cadastrar">Cadastrar</a></li>
            </ul>
        </nav>

        <main class="Local_logo"> <div class="Tamanho_Logo">
                <img src="/assets/logo.png" alt="Logo Nouvelle">
            </div>

            <div class="Tamanho_Caixas_TXT"> <form>

                    </div>
                    <div class="login_senha_caixas"> <input type="password" placeholder="Confirmar Senha" required>
                    </div>
                    
                    <button type="submit" class="btn-login">Cadastrar</button>

                    <div class="utilidades_abaixo"> <a href="#" class="link_login">Já tem uma conta? Faça login</a>
                    </div>
                </form>
            </div>

        </main>
    </div>
