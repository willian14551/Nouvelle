<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/miniLogo.png" type="image/x-icon">
    <title>Nouvelle - Filmes em Cartaz</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/filmesCartaz.css"> 
</head>
<body>
  <nav class="menu">
    <a href="/">
      <img src="/assets/logo.png" alt="Nouvelle" width="200" height="100">
    </a>

    <input type="checkbox" id="menu-burguer">
    <label for="menu-burguer" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <ul class="menu-links">
        <li><a class="menuInicio" href="/">Início</a></li>
        <li><a class="menuFilmesCartaz" href="/filmesCartaz">Filmes em Cartaz</a></li>      
        <li><a class="menuEmBreve" href="/emBreve">Em Breve</a></li> 
    </ul>
    <ul class="menu-login">
        {% if request.cookies.get('usuario_nome') %}
            <li><a id="menuPerfil" href="/perfil" >Olá, {{ request.cookies.get('usuario_nome').split()[0] }}</a></li>
            <li><a id="menuLogout" href="/logout" class="btn-entrar">Sair</a></li>
        {% else %}
            <li><a id="menuLogin" href="/login" class="btn-entrar">Entrar</a></li>
            <li><a id="menuCadastro" href="/cadastro" class="btn-cadastrar">Cadastrar</a></li>
        {% endif %}
    </ul>
  </nav>

  <center>
    <!-- Caixa de Pesquisa -->
    <div class="search-box">
      <input type="text" id="inputBuscar" placeholder="Buscar..">
      <button id="btnBuscar">🔍︎</button>
      <!-- LINK PARA A LUPA EM TXT => "https://www.emojiall.com/pt/code/1F50D-FE0E" -->
    </div>

    <h2 class="tituloPag">Filmes em Cartaz</h2>
    <h1 class="msgErro"></h1>
    <h1 class="msgErro1"></h1>

    <div class="gradeFilmes" id="corpoTabela">
      {% for filme in filmes %}
      <div class="cardFilme">
        <a href="/detalhes/{{ filme.id }}">
          <img class="posterFilme" src="https://image.tmdb.org/t/p/w500{{ filme.poster_path }}" alt="{{ filme.title }}">
          <strong class="tituloFilme">{{ filme.title }}</strong>
        </a>
      </div>
      {% endfor %}
    </div>
    
  </center>

  <script src="/js/filmesCartaz.js"></script>
</body>
</html>
