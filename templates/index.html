<!DOCTYPE html>
<html>
    <head>
        <title>Nouvelle</title>
        <link rel="stylesheet" href="/css/main.css">
    </head>
    <body>
        <nav class = "menu">
            <img src="/assets/logo.png" alt="Nouvelle" width="200" height="100">

            <ul class="menu-links">
            <li><a href="#">Início</a></li>
            <li><a href="#">Filmes em Cartaz</a></li>      
            <li><a href="#">Em Breve</a></li> 

            </ul>
            <ul class="menu-login">
            <li><a href="#" class="btn-entrar">Entrar</a></li>
            <li><a href="#" class="btn-cadastrar">Cadastrar</a></li>
            </ul>
        </nav>
        <div class="banner-carrossel">
            <button class="seta seta-esquerda" id="prev">&#10094;</button>
            <button class="seta seta-direita" id="next">&#10095;</button>

            <div class="slides-carrossel" id="slides-carrossel">
                {% for filme in filmes %}

                <div class="slide {% if loop.first %}ativo{% endif %}">
                    <img src="https://image.tmdb.org/t/p/original{{ filme.backdrop_path }}" alt="{{filme.title}}">
                    
                    <div class="info-filme">
                        <h3>{{filme.title}}</h3>
                        <p>{{filme.overview[:400]}}</p>
                    </div>
                </div>

                {% endfor %}

            </div>
        </div>
        <script src="/js/index.js"></script>
    </body>
</html>
