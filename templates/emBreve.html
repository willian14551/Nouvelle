<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle - Em Breve</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/emBreve.css">
</head>
<body>
    <nav class="menu">
        <img src="/assets/logo.png" alt="Nouvelle" width="200" height="100">
        <ul class="menu-links">
            <li><a href="/">Início</a></li>
            <li><a href="/filmesCartaz.html">Filmes em Cartaz</a></li>
            <li><a href="/emBreve.html">Em Breve</a></li> 
        </ul>
        <ul class="menu-login">
            <li><a href="/login.html" class="btn-entrar">Entrar</a></li>
            <li><a href="/cadastro.html" class="btn-cadastrar">Cadastrar</a></li>
        </ul>
    </nav>

    <main class="conteudo-principal">
        <h2 style="color: white; text-align: center; margin-top: 30px; font-size: 2rem;">Em Breve</h2>
        
        <div class="gradeFilmes" id="corpoTabela">
            {% for filme in filmes %}
            <div class="cardFilme">
                <img class="posterFilme" 
                     src="https://image.tmdb.org/t/p/w500{{ filme.poster_path }}" 
                     alt="{{ filme.title }}">
                <strong class="tituloFilme">{{ filme.title }}</strong>
            </div>
            {% endfor %}
        </div>
    </main>

    <script src="/js/emBreve.js"></script>
</body>
</html>
