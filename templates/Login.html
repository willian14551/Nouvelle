<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/miniLogo.png" type="image/x-icon">
    <title>Nouvelle - Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <nav class="menu">
        <a href="/">
            <img src="/assets/logo.png" alt="Nouvelle" width="200" height="100">
        </a>

        <input type="checkbox" id="menu-burguer">
        <label for="menu-burguer" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <ul class="menu-links">
            <li><a class="menuInicio" href="/">Início</a></li>
            <li><a class="menuFilmesCartaz" href="/filmesCartaz">Filmes em Cartaz</a></li>      
            <li><a class="menuEmBreve" href="/emBreve">Em Breve</a></li> 
        </ul>
        <ul class="menu-login">
            {% if request.cookies.get('usuario_nome') %}
                <li><a id="menuPerfil" href="/perfil" >Olá, {{ request.cookies.get('usuario_nome').split()[0] }}</a></li>
                <li><a id="menuLogout" href="/logout" class="btn-entrar">Sair</a></li>
            {% else %}
                <li><a id="menuLogin" href="/login" class="btn-entrar">Entrar</a></li>
                <li><a id="menuCadastro" href="/cadastro" class="btn-cadastrar">Cadastrar</a></li>
            {% endif %}
        </ul>
    </nav>

    <div class="caixaLogin">
        <main class="Local_logo">
            <div class="Tamanho_Logo">
                <img src="assets/logo.png" alt="Logo Nouvelle">
            </div>
        </main>
        
        <form action="/login" method="POST" id="formLogin">
            <div class="login_senha_caixas">
                <input type="email" name="email" placeholder="E-mail" required>
            </div>
            <div class="login_senha_caixas">
                <input type="password" name="senha" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>

            {% if mensagem %}
                <p style="color: red; 
                margin-top: 15px; 
                text-align: center;">
                {{ mensagem }}</p>
            {% endif %}

            <div class="utilidades">
                <div class="lembre_de_mim">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembre-se de mim</label>
                </div>
                <a href="#" class="Qual_minha_senha">Esqueceu sua senha?</a>
            </div>
        </form>
        
    </div>
    
</body>
</html>
