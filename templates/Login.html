<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <nav class = "menu">
            <img src="assets/logo.png" alt="Nouvelle" width="200" height="100">

            <ul class="menu-links">
            <li><a href="/">Início</a></li>
            <li><a href="/filmesCartaz.html">Filmes em Cartaz</a></li>      
            <li><a href="/emBreve.html">Em Breve</a></li> 

            </ul>
            <ul class="menu-login">
            <li><a href="/login.html" class="btn-entrar">Entrar</a></li>
            <li><a href="/cadastro.html" class="btn-cadastrar">Cadastrar</a></li>
            </ul>
        </nav>

        <main class="Local_logo"> <div class="Tamanho_Logo">
                <img src="assets/logo.png" alt="Logo Nouvelle">
            </div>
        </main>
        <form action="/login" method="POST" id="formLogin">
            <div class="login_senha_caixas">
                <input type="email" name="email" placeholder="E-mail" required>
            </div>
            <div class="login_senha_caixas">
                <input type="password" name="senha" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>

            {% if mensagem %}
                <p style="color: red; 
                margin-top: 15px; 
                text-align: center;">
                {{ mensagem }}</p>
            {% endif %}

            <div class="utilidades">
                <div class="lembre_de_mim">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembre-se de mim</label>
                </div>
                <a href="#" class="Qual_minha_senha">Esqueceu sua senha?</a>
            </div>
        </form>
    </div>
</body>
</html>
